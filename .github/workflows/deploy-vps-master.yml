name: deploy-vps-master

on:
  workflow_run:
    workflows: ["docker-build"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-vps-master
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS on master push
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"

            # Ensure deployment always targets your master branch.
            git fetch --all --prune
            git checkout master
            git pull --ff-only origin master

            # Seed missing env/dist/etc/*.conf from templates only (does not
            # overwrite live configs). Optional repo secret SYNC_ETC_FORCE=1
            # replaces worldserver.conf/authserver.conf from .dist on demand.
            if [ -n '${{ secrets.SYNC_ETC_FORCE }}' ]; then
              export SYNC_ETC_FORCE='${{ secrets.SYNC_ETC_FORCE }}'
            fi
            bash apps/deploy/sync-etc-from-dist.sh .

            # Bind-mounted etc/logs must be writable by the container user (compose
            # default uid/gid 1000). Deploying as root often leaves root-owned files,
            # which breaks entrypoint.sh (cp into etc, touch .write-test).
            _uid=1000
            _gid=1000
            if [ -f .env ]; then
              _v=$(grep -E '^[[:space:]]*DOCKER_USER_ID=' .env | tail -1 | cut -d= -f2- | tr -d ' "\r')
              [ -n "${_v}" ] && _uid="${_v}"
              _v=$(grep -E '^[[:space:]]*DOCKER_GROUP_ID=' .env | tail -1 | cut -d= -f2- | tr -d ' "\r')
              [ -n "${_v}" ] && _gid="${_v}"
            fi
            mkdir -p env/dist/etc/modules env/dist/logs
            chown -R "${_uid}:${_gid}" env/dist/etc env/dist/logs

            if [ -n "${{ secrets.VPS_DOCKER_REGISTRY || '' }}" ]; then
              echo "${{ secrets.VPS_DOCKER_PASSWORD }}" | docker login "${{ secrets.VPS_DOCKER_REGISTRY }}" -u "${{ secrets.VPS_DOCKER_USERNAME }}" --password-stdin
            fi

            # Optional build/install step on server.
            if [ "${{ secrets.VPS_RUN_BUILD }}" = "true" ]; then
              mkdir -p build
              cd build
              cmake .. -DCMAKE_INSTALL_PREFIX="${HOME}/azeroth-server" -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSCRIPTS=static -DMODULES=static
              make -j"$(nproc)"
              make install
            fi

            # Image vars: export from CI only when secrets are non-empty. If we
            # export empty values, they override BLACKROSE/.env and you get the
            # wrong registry (compose ${VAR:-default} still sees VAR as set).
            if [ -n '${{ secrets.DOCKER_IMAGE_PREFIX }}' ]; then
              export DOCKER_IMAGE_PREFIX='${{ secrets.DOCKER_IMAGE_PREFIX }}'
            fi
            if [ -n '${{ secrets.DOCKER_IMAGE_TAG }}' ]; then
              export DOCKER_IMAGE_TAG='${{ secrets.DOCKER_IMAGE_TAG }}'
            fi

            # Stop stack, pull images, rebuild death-webhook sidecar, start.
            docker compose -f docker-compose.yml -f docker-compose.override.yml down --remove-orphans
            docker compose -f docker-compose.yml -f docker-compose.override.yml pull
            docker compose -f docker-compose.yml -f docker-compose.override.yml build ac-death-webhook
            docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --remove-orphans
