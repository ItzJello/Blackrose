services:
  # Discord BRDEATH forwarder; mount same logs volume as worldserver.
  # Loads WEBHOOK_URL (and optional WEBHOOK_USERNAME, EMBED_COLOR) from env_file.
  # Default path below; override with DOCKER_DEATH_WEBHOOK_ENV_FILE in project .env
  # to match where your file actually lives. The user running `docker compose` must
  # be able to read that path (e.g. chgrp deploy + chmod 640 on /etc/...).
  # If the env file is missing, the script idles. WORLD_LOG is forced for Docker.
  ac-death-webhook:
    container_name: ac-death-webhook
    build:
      context: .
      dockerfile: apps/docker/Dockerfile.death-webhook
    networks:
      - ac-network
    restart: unless-stopped
    env_file:
      - path: ${DOCKER_DEATH_WEBHOOK_ENV_FILE:-/etc/blackrose/death_webhook.env}
        required: false
    environment:
      WORLD_LOG: /logs/Server.log
    volumes:
      - ${DOCKER_VOL_LOGS:-./env/dist/logs}:/logs:ro
    depends_on:
      ac-worldserver:
        condition: service_started

  # Default matches .github/workflows/docker_build.yml (GHCR). Override with
  # DOCKER_IMAGE_PREFIX / DOCKER_IMAGE_TAG in .env or CI secrets if needed.
  ac-db-import:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-db-import:${DOCKER_IMAGE_TAG:-master}

  ac-worldserver:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-worldserver:${DOCKER_IMAGE_TAG:-master}

  ac-authserver:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-authserver:${DOCKER_IMAGE_TAG:-master}

  ac-client-data-init:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-client-data:${DOCKER_IMAGE_TAG:-master}

  ac-tools:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-tools:${DOCKER_IMAGE_TAG:-master}

  # GHCR tag from docker_build.yml uses component-name "dev" (not dev-server).
  ac-dev-server:
    image: ${DOCKER_IMAGE_PREFIX:-ghcr.io/blackrosewow/blackrose}-dev:${DOCKER_IMAGE_TAG:-master}
